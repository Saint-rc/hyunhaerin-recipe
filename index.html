<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>현,해린 이유식·유아식</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="현해린레시피">
  <meta name="theme-color" content="#FF8264">
  <link rel="apple-touch-icon" href="images/app.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --card: #FFFFFF;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
      --baby-primary: #FF8264;
      --baby-light: #FFF0EA;
      --baby-text: #C45A3A;
      --toddler-primary: #3FB89A;
      --toddler-light: #E0F7F2;
      --toddler-text: #1E7A64;
      --text: #2A2A2A;
      --muted: #888;
      --border: #F0E8E0;
      --header-h: 58px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: var(--bg);
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      color: var(--text); font-size: 16px; overflow-x: hidden;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(255,248,243,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
    }
    #back-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: transparent; cursor: pointer; display: none;
      align-items: center; justify-content: center; font-size: 20px;
    }
    #back-btn.visible { display: flex; }
    #header-title { font-size: 17px; font-weight: 700; flex: 1; }
    #breadcrumb { font-size: 12px; color: var(--muted); }

    /* ── Main ── */
    #main {
      margin-top: var(--header-h);
      padding: 20px 16px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Pages ── */
    .page { display: none; animation: fadeIn .25s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Home Page ── */
    .home-title { text-align: center; margin-bottom: 28px; }
    .home-title h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .home-title p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .category-grid { display: grid; gap: 14px; }
    .cat-card {
      border-radius: 20px; padding: 28px 24px; cursor: pointer;
      box-shadow: var(--shadow); border: none; text-align: left; width: 100%;
      transition: transform .15s, box-shadow .15s;
    }
    .cat-card:active { transform: scale(.97); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
    .cat-card.baby { background: linear-gradient(135deg, #FFEDE5, #FFD6C7); }
    .cat-card.toddler { background: linear-gradient(135deg, #DFF7F0, #C5EDE3); }
    .cat-emoji { font-size: 40px; margin-bottom: 12px; display: block; }
    .cat-name { font-size: 22px; font-weight: 700; color: var(--text); }
    .cat-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .cat-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
    .tag {
      font-size: 12px; font-weight: 500; padding: 4px 10px;
      border-radius: 20px; opacity: .8;
    }
    .baby .tag { background: rgba(255,130,100,.2); color: var(--baby-text); }
    .toddler .tag { background: rgba(63,184,154,.2); color: var(--toddler-text); }
    .adult .tag { background: rgba(120,80,180,.2); color: #6A3FAB; }
    .cat-card.adult { background: linear-gradient(135deg, #EDE0FF, #D8C5F5); grid-column: 1 / -1; display: flex; align-items: center; gap: 20px; }
    .cat-card.adult .cat-emoji { margin-bottom: 0; font-size: 44px; }
    .cat-card.adult .cat-info { flex: 1; }
    .cat-card.adult .cat-tags { margin-top: 10px; }

    /* ── Sub-category Page ── */
    .section-label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 14px; }
    .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sub-card {
      border-radius: 16px; padding: 20px 16px; cursor: pointer;
      box-shadow: var(--shadow); border: 2px solid transparent;
      transition: transform .15s, border-color .15s; background: var(--card);
    }
    .sub-card:active { transform: scale(.96); }
    .sub-card.active-baby { border-color: var(--baby-primary); background: var(--baby-light); }
    .sub-card.active-toddler { border-color: var(--toddler-primary); background: var(--toddler-light); }
    .sub-emoji { font-size: 30px; margin-bottom: 8px; }
    .sub-name { font-size: 16px; font-weight: 700; }
    .sub-count { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Recipe List Page ── */
    .group-section { margin-bottom: 18px; }
    .group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-radius: var(--radius);
      cursor: pointer; user-select: none;
      transition: opacity .15s;
    }
    .group-header:active { opacity: .75; }
    .group-header.baby-group { background: var(--baby-light); }
    .group-header.toddler-group { background: var(--toddler-light); }
    .group-icon { font-size: 24px; }
    .group-info { flex: 1; }
    .group-name { font-size: 15px; font-weight: 700; }
    .group-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .group-chevron { font-size: 14px; color: var(--muted); transition: transform .2s; }
    .group-chevron.open { transform: rotate(90deg); }
    .recipe-list { display: none; padding: 8px 0 4px 0; gap: 8px; flex-direction: column; }
    .recipe-list.open { display: flex; }
    .recipe-item {
      background: var(--card); border-radius: 12px; padding: 14px 16px;
      cursor: pointer; box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      display: flex; align-items: center; gap: 12px;
      transition: transform .12s;
    }
    .recipe-item:active { transform: scale(.98); }
    .recipe-item-info { flex: 1; }
    .recipe-item-name { font-size: 15px; font-weight: 600; }
    .recipe-item-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .recipe-item-badges { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 500; padding: 2px 8px;
      border-radius: 10px;
    }
    .badge-age-baby { background: var(--baby-light); color: var(--baby-text); }
    .badge-age-toddler { background: var(--toddler-light); color: var(--toddler-text); }
    .badge-age-adult { background: #EDE0FF; color: #6A3FAB; }
    .group-header.adult-group { background: #EDE0FF; }
    .step-num.adult-num { background: #EDE0FF; color: #6A3FAB; }
    .recipe-hero.adult-hero { background: linear-gradient(135deg, #EDE0FF, #D8C5F5); }
    .tip-box.adult-tip { background: #EDE0FF; border-color: #9B6FD4; }
    .badge-time { background: #F3F3F3; color: #666; }
    .recipe-arrow { font-size: 14px; color: #CCC; }

    /* ── Recipe Detail Page ── */
    .recipe-hero {
      border-radius: 20px; padding: 24px 20px; margin-bottom: 20px;
      text-align: center;
    }
    .recipe-hero.baby-hero { background: linear-gradient(135deg, var(--baby-light), #FFD6C7); }
    .recipe-hero.toddler-hero { background: linear-gradient(135deg, var(--toddler-light), #B8EDE3); }
    .recipe-hero-emoji { font-size: 52px; margin-bottom: 12px; }
    .recipe-hero-img {
      width: 100%; max-height: 220px; object-fit: cover;
      border-radius: 16px; margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .recipe-hero-name { font-size: 24px; font-weight: 700; }
    .recipe-hero-badges { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .recipe-hero-badge {
      font-size: 13px; font-weight: 500; padding: 5px 12px;
      border-radius: 20px; background: rgba(255,255,255,0.7);
    }
    .recipe-section {
      background: var(--card); border-radius: var(--radius);
      padding: 18px 16px; margin-bottom: 14px; box-shadow: var(--shadow);
    }
    .recipe-section-title {
      font-size: 15px; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .ingredient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ingredient-item {
      background: var(--bg); border-radius: 10px; padding: 10px 12px;
    }
    .ing-name { font-size: 13px; font-weight: 600; }
    .ing-amount { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .step-item {
      display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start;
    }
    .step-item:last-child { margin-bottom: 0; }
    .step-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .step-num.baby-num { background: var(--baby-light); color: var(--baby-text); }
    .step-num.toddler-num { background: var(--toddler-light); color: var(--toddler-text); }
    .step-text { font-size: 14px; line-height: 1.7; padding-top: 4px; }
    .tip-box {
      border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
      border-left: 4px solid;
    }
    .tip-box.baby-tip { background: var(--baby-light); border-color: var(--baby-primary); }
    .tip-box.toddler-tip { background: var(--toddler-light); border-color: var(--toddler-primary); }
    .tip-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .tip-text { font-size: 13px; line-height: 1.6; color: #555; }
    .note-box { background: #F9F6F2; border-radius: 12px; padding: 14px 16px; font-size: 13px; color: #888; line-height: 1.7; }

    /* ── PWA 설치 버튼 ── */
    #install-btn {
      display: none;
      position: fixed; bottom: calc(20px + env(safe-area-inset-bottom));
      right: 16px; z-index: 200;
      background: linear-gradient(135deg, #FF8264, #FF6B6B);
      color: white; border: none; border-radius: 24px;
      padding: 12px 20px; font-size: 14px; font-weight: 700;
      box-shadow: 0 4px 16px rgba(255,130,100,.45);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    #install-btn.hidden { display: none !important; }
    #install-btn:active { transform: scale(.96); }

    /* ── iOS 안내 모달 ── */
    #ios-modal {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.5); align-items: flex-end;
    }
    #ios-modal.open { display: flex; }
    #ios-modal-box {
      background: white; border-radius: 24px 24px 0 0;
      padding: 28px 24px calc(24px + env(safe-area-inset-bottom));
      width: 100%; animation: slideUp .3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    #ios-modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    #ios-modal-box p { font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 20px; }
    .ios-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .ios-step { display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .ios-step-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      background: var(--baby-light); color: var(--baby-text);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    #ios-close {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: #F0F0F0; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    }
  </style>
</head>
<body>

<!-- PWA 설치 버튼 -->
<button id="install-btn" class="hidden" onclick="handleInstall()">
  📲 앱으로 설치
</button>

<!-- iOS 안내 모달 -->
<div id="ios-modal" onclick="closeIosModal(event)">
  <div id="ios-modal-box">
    <h3>📲 홈 화면에 추가하기</h3>
    <p>아래 방법으로 앱처럼 바로가기를 만들 수 있어요!</p>
    <div class="ios-steps">
      <div class="ios-step"><div class="ios-step-num">1</div><span>하단 Safari <b>공유 버튼</b> (□↑) 탭</span></div>
      <div class="ios-step"><div class="ios-step-num">2</div><span><b>홈 화면에 추가</b> 선택</span></div>
      <div class="ios-step"><div class="ios-step-num">3</div><span>오른쪽 상단 <b>추가</b> 탭</span></div>
    </div>
    <button id="ios-close" onclick="document.getElementById('ios-modal').classList.remove('open')">확인</button>
  </div>
</div>

<!-- Header -->
<div id="header">
  <button id="back-btn" onclick="goBack()">←</button>
  <div>
    <div id="header-title">🍼 현,해린 이유식·유아식</div>
    <div id="breadcrumb"></div>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- 홈 -->
  <div id="page-home" class="page active">
    <div class="home-title">
      <h1>현,해린 레시피 모음</h1>
      <p>카테고리를 선택해 주세요</p>
    </div>
    <div class="category-grid">
      <button class="cat-card baby" onclick="selectCategory('이유식')">
        <span class="cat-emoji">🍼</span>
        <div class="cat-name">이유식</div>
        <div class="cat-desc">생후 4개월 ~ 12개월</div>
        <div class="cat-tags">
          <span class="tag">밥 (죽·진밥)</span>
          <span class="tag">간식</span>
        </div>
      </button>
      <button class="cat-card toddler" onclick="selectCategory('유아식')">
        <span class="cat-emoji">🥣</span>
        <div class="cat-name">유아식</div>
        <div class="cat-desc">12개월 이후 ~ 36개월</div>
        <div class="cat-tags">
          <span class="tag">밥</span>
          <span class="tag">국</span>
          <span class="tag">반찬</span>
          <span class="tag">간식</span>
        </div>
      </button>
      <button class="cat-card adult" onclick="selectCategory('성인레시피')">
        <span class="cat-emoji">🍽️</span>
        <div class="cat-info">
          <div class="cat-name">성인's 레시피</div>
          <div class="cat-desc">어른을 위한 요리 모음</div>
          <div class="cat-tags">
            <span class="tag">요리</span>
            <span class="tag">식사</span>
            <span class="tag">찌개</span>
            <span class="tag">디저트</span>
            <span class="tag">음료</span>
          </div>
        </div>
      </button>
    </div>
  </div>

  <!-- 소카테고리 -->
  <div id="page-sub" class="page"></div>

  <!-- 레시피 목록 -->
  <div id="page-list" class="page"></div>

  <!-- 레시피 상세 -->
  <div id="page-recipe" class="page"></div>

</div>

// ─────────────────────────────────────────
//  상태 & 네비게이션
// ─────────────────────────────────────────
let state = { category: null, sub: null, recipe: null }
let history = []

// ─────────────────────────────────────────
//  PWA 설치
// ─────────────────────────────────────────
let deferredPrompt = null
const installBtn = document.getElementById('install-btn')
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
const isInStandalone = window.matchMedia('(display-mode: standalone)').matches

if (!isInStandalone) {
  if (isIOS) {
    installBtn.classList.remove('hidden')
  } else {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault()
      deferredPrompt = e
      installBtn.classList.remove('hidden')
    })
  }
}

window.addEventListener('appinstalled', () => {
  installBtn.classList.add('hidden')
  deferredPrompt = null
})

function handleInstall() {
  if (isIOS) {
    document.getElementById('ios-modal').classList.add('open')
  } else if (deferredPrompt) {
    deferredPrompt.prompt()
    deferredPrompt.userChoice.then(() => { deferredPrompt = null })
  }
}

function closeIosModal(e) {
  if (e.target === document.getElementById('ios-modal')) {
    document.getElementById('ios-modal').classList.remove('open')
  }
}

function navigate(pageId, newState = {}) {
  history.push(document.querySelector('.page.active')?.id)
  state = { ...state, ...newState }
  showPage(pageId)
  updateHeader()
}

function goBack() {
  const prev = history.pop()
  if (prev) {
    if (prev === 'page-home') state = { category: null, sub: null, recipe: null }
    else if (prev === 'page-sub') state = { ...state, sub: null, recipe: null }
    else if (prev === 'page-list') state = { ...state, recipe: null }
    showPage(prev)
    updateHeader()
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function updateHeader() {
  const backBtn = document.getElementById('back-btn')
  const title = document.getElementById('header-title')
  const bc = document.getElementById('breadcrumb')
  const isHome = !state.category

  backBtn.classList.toggle('visible', !isHome)

  if (!state.category) {
    title.textContent = '🍼 현,해린 이유식·유아식'
    bc.textContent = ''
  } else if (!state.sub) {
    const d = DATA[state.category]
    title.textContent = `${d.emoji} ${state.category}`
    bc.textContent = ''
  } else if (!state.recipe) {
    const sub = DATA[state.category].subs[state.sub]
    title.textContent = `${sub.emoji} ${state.sub}`
    bc.textContent = state.category
  } else {
    title.textContent = state.recipe.name
    bc.textContent = `${state.category} > ${state.sub}`
  }
}

// ─────────────────────────────────────────
//  렌더링
// ─────────────────────────────────────────
function selectCategory(cat) {
  const d = DATA[cat]
  const subs = Object.entries(d.subs)
  const colorClass = d.color

  const html = `
    <div class="section-label">${cat} 소카테고리</div>
    <div class="sub-grid">
      ${subs.map(([name, sub]) => `
        <button class="sub-card" onclick="selectSub('${name}')">
          <div class="sub-emoji">${sub.emoji}</div>
          <div class="sub-name">${name}</div>
          <div class="sub-count">${sub.count}</div>
        </button>
      `).join('')}
    </div>
  `
  document.getElementById('page-sub').innerHTML = html
  navigate('page-sub', { category: cat })
}

function selectSub(sub) {
  const d = DATA[state.category]
  const subData = d.subs[sub]

  const groupClass = colorClass + '-group'

  const html = subData.groups.map((g, gi) => `

          <div class="group-name">${g.name}</div>
          <div class="group-sub">${g.sub}</div>
        </div>
        <div class="group-chevron" id="chevron-${gi}">▶</div>
      </div>
      <div class="recipe-list" id="group-${gi}">
        ${g.recipes.map((r, ri) => `
          <div class="recipe-item" onclick="selectRecipe(${gi}, ${ri})">
            <div style="font-size:28px">${r.emoji}</div>
            <div class="recipe-item-info">
              <div class="recipe-item-name">${r.name}</div>
              <div class="recipe-item-meta">${g.sub}</div>
              <div class="recipe-item-badges">
                <span class="badge badge-age-${colorClass}">${r.age}</span>
                <span class="badge badge-time">⏱ ${r.time}</span>
                <span class="badge badge-time">${r.difficulty}</span>
              </div>
            </div>
            <div class="recipe-arrow">›</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('')

  document.getElementById('page-list').innerHTML = html
  navigate('page-list', { sub })
}

function toggleGroup(idx) {
  const list = document.getElementById(`group-${idx}`)
  const chevron = document.getElementById(`chevron-${idx}`)
  list.classList.toggle('open')
  chevron.classList.toggle('open')
}

function selectRecipe(gi, ri) {
  const d = DATA[state.category]
  const subData = d.subs[state.sub]
  const recipe = subData.groups[gi].recipes[ri]
  const colorClass = d.color

  const html = `
    <div class="recipe-hero ${colorClass}-hero">
      ${recipe.image
        ? `<img class="recipe-hero-img" src="${recipe.image}" alt="${recipe.name}">`
        : `<div class="recipe-hero-emoji">${recipe.emoji}</div>`
      }
      <div class="recipe-hero-name">${recipe.name}</div>
      <div class="recipe-hero-badges">
        <span class="recipe-hero-badge">👶 ${recipe.age}</span>
        <span class="recipe-hero-badge">⏱ ${recipe.time}</span>
        <span class="recipe-hero-badge">🔥 ${recipe.difficulty}</span>
      </div>
    </div>

    <div class="tip-box ${colorClass}-tip">
      <div class="tip-title">💡 이런 레시피예요</div>
      <div class="tip-text">${recipe.tip}</div>
    </div>

    <div class="recipe-section">
      <div class="recipe-section-title">🛒 재료</div>
      <div class="ingredient-grid">
        ${recipe.ingredients.map(i => `
          <div class="ingredient-item">
            <div class="ing-name">${i.name}</div>
            <div class="ing-amount">${i.amount}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="recipe-section">
      <div class="recipe-section-title">👩‍🍳 만드는 순서</div>
      ${recipe.steps.map((s, i) => `
        <div class="step-item">
          <div class="step-num ${colorClass}-num">${i + 1}</div>
          <div class="step-text">${s}</div>
        </div>
      `).join('')}
    </div>

    <div class="note-box">
      ⚠️ <b>주의사항</b><br>
      모든 음식은 처음 먹일 때 소량씩 시작하여 3~5일 간격으로 알레르기 반응을 확인하세요.
      아이의 개인차가 있으니 의사·영양사 상담을 권장합니다.
    </div>
  `

  document.getElementById('page-recipe').innerHTML = html
  navigate('page-recipe', { recipe })

  // 페이지 상단으로 스크롤
  document.getElementById('main').scrollTop = 0
  window.scrollTo(0, 0)
}
</script>
